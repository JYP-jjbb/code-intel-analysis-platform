server:
  port: 8080
  error:
    include-message: always

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  workspace:
    root: workspace/tasks
  settings:
    file: workspace/settings/settings.json
  code-review:
    temp-root: workspace/temp/code-review
    temp-ttl-hours: 12
    temp-clean-interval-ms: 1800000
  nutera:
    runtimePath: runtimes/nutera
    mode: MOCK
    pythonCommand: python3
    dockerImage: nutera
    timeoutSeconds: 600
    checker:
      java11-home: "${NUTERA_CHECKER_JAVA11_HOME:C:/Program Files/Eclipse Adoptium/jdk-11.0.28.6-hotspot}"
    rfPromptPath: runtimes/nutera/config/prompts/rf_generation_l3.txt
    report-db:
      enabled: ${NUTERA_REPORT_DB_ENABLED:true}
      url: ${NUTERA_SQLSERVER_URL:jdbc:sqlserver://localhost:1433;databaseName=code_intel_analysis;encrypt=false;trustServerCertificate=true}
      username: ${NUTERA_SQLSERVER_USERNAME:test}
      password: ${NUTERA_SQLSERVER_PASSWORD:123456}
      startup-check:
        strict: ${NUTERA_REPORT_DB_STARTUP_CHECK_STRICT:true}
  code-run:
    max-source-chars: ${CODE_RUN_MAX_SOURCE_CHARS:120000}
    max-stdin-chars: ${CODE_RUN_MAX_STDIN_CHARS:60000}
    compile-timeout-seconds: ${CODE_RUN_COMPILE_TIMEOUT_SECONDS:15}
    run-timeout-seconds: ${CODE_RUN_TIMEOUT_SECONDS:5}
    max-output-chars: ${CODE_RUN_MAX_OUTPUT_CHARS:120000}
    commands:
      gpp: ${CODE_RUN_GPP_COMMAND:g++}
      javac: ${CODE_RUN_JAVAC_COMMAND:javac}
      java: ${CODE_RUN_JAVA_COMMAND:java}
      python: ${CODE_RUN_PYTHON_COMMAND:python}
  moonshot:
    base-url: ${MOONSHOT_BASE_URL:${OPENAI_BASE_URL:https://api.moonshot.cn/v1}}
    api-key: ${MOONSHOT_API_KEY:${OPENAI_API_KEY:}}
    model: ${MOONSHOT_MODEL:kimi-k2.5}
    timeoutSeconds: 90
  hunyuan:
    base-url: ${HUNYUAN_BASE_URL:https://api.hunyuan.cloud.tencent.com/v1}
    api-key: ${HUNYUAN_API_KEY:${OPENAI_API_KEY:}}
    model: ${HUNYUAN_MODEL:hunyuan-2.0-thinking-20251109}
  qwen:
    base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${QWEN_API_KEY:}
    model: ${QWEN_MODEL:qwen3.5-plus}
  deepseek:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    chat-model: ${DEEPSEEK_CHAT_MODEL:deepseek-chat}
    reasoner-model: ${DEEPSEEK_REASONER_MODEL:${DEEPSEEK_MODEL:deepseek-reasoner}}
  demo:
    enabled: true

checker:
  java:
    home: ${CHECKER_JAVA_HOME:}
