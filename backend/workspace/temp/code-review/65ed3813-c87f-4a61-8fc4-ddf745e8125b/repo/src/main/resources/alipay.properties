# ============================================================
# 支付宝支付（沙箱）配置
# ============================================================

# 沙箱 APPID
alipay.app-id=9021000158654161

# 商户应用私钥（PKCS8，RSA2）
alipay.merchant-private-

# 支付宝公钥（沙箱应用的支付宝公钥）
alipay.alipay-public-

# 签名类型
alipay.sign-type=RSA2

# 字符集
alipay.charset=UTF-8

# 格式
alipay.format=json

# 网关（沙箱：openapi-sandbox.dl.alipaydev.com，正式：openapi.alipay.com）
alipay.gateway-url=https://openapi-sandbox.dl.alipaydev.com/gateway.do

# 通知域名（公网可访问到你后端的域名，例如 ngrok）
# 最终回调地址 = {alipay.notify-domain}/api/pay/alipay/notify
alipay.notify-domain=https://unnihilistic-diagonally-mack.ngrok-free.dev
