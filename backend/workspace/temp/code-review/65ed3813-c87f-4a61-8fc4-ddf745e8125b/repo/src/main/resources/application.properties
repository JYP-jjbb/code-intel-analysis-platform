# ===================================================================
# 应用基础配置
# ===================================================================

# ===================================================================
# 服务端口
# ===================================================================
server.port=8080
server.servlet.context-path=/

# ===================================================================
# 数据源（SQL Server）
# ===================================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=online_ordering;encrypt=false;trustServerCertificate=true
spring.datasource.username=test
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 连接池配置
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ===================================================================
# MyBatis 配置
# ===================================================================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.mickey.onlineordering.onlineorderingserver.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.cache-enabled=true
mybatis.configuration.lazy-loading-enabled=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# ===================================================================
# Redis 配置
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
# Redis密码
spring.data.redis.password=
spring.data.redis.timeout=3000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ===================================================================
# 邮件配置
# ===================================================================
spring.mail.host=smtp.qq.com
spring.mail.port=465
# 发件人邮箱地址
spring.mail.username=2218846442@qq.com
spring.mail.password=hvagqlezffcmeajg
spring.mail.default-encoding=UTF-8
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===================================================================
# 日志配置
# ===================================================================
logging.level.root=INFO
logging.level.com.mickey.onlineordering.onlineorderingserver=DEBUG
logging.level.com.mickey.onlineordering.onlineorderingserver.mapper=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n
logging.file.name=logs/online-ordering.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===================================================================
# Jackson 配置
# ===================================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===================================================================
# Swagger 配置
# ===================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===================================================================
# 文件上传配置
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===================================================================
# 项目信息
# ===================================================================
spring.application.name=online-ordering-server
spring.output.ansi.enabled=always

# ===================================================================
# 热替换（DevTools）
# ===================================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===================================================================
# 前端配置
# ===================================================================
frontend.dir=online-ordering-client
frontend.port=3000
frontend.auto-start=true
