# NuTERA Research Artifact — Default Configuration
# Quick start:
#   python main.py run \
#     --problem-set-csv benchmarking/problem-sets/eight_sets.csv \
#     --config config/default.yaml

# ---------------------------------------------------------------------------
# LLM Configuration
# ---------------------------------------------------------------------------
llm:
  # Provider and model for ranking-function generation
  rf_provider: "openrouter"
  rf_model: "openai/gpt-5-mini"
  # Other supported rf_model values:
  #   "google/gemini-3-flash-preview"
  #   "x-ai/grok-4.1-fast"
  #   "anthropic/claude-haiku-4.5"

  # Show chain-of-thought for Gemini models via OpenRouter
  gemini_show_reasoning: true

  # Per-model extra_body overrides (OpenRouter only)
  openrouter_extra_body_by_model:
    "anthropic/claude-haiku-4.5":
      include_reasoning: true
      reasoning:
        enabled: true
        max_tokens: 5000

  # API keys — resolved from environment variables at runtime
  openai_api_key: ${OPENAI_API_KEY}
  openai_base_url: null
  openrouter_api_key: ${OPENROUTER_API_KEY}
  openrouter_base_url: "https://openrouter.ai/api/v1"
  google_api_key: ${GOOGLE_API_KEY}
  deepseek_api_key: ${DEEPSEEK_API_KEY}

  # Generation parameters
  temperature: 1.0
  max_tokens: 100000
  max_attempts: 10  # Maximum synthesis attempts per program

  # Ablation level (controls synthesizer feedback strategy):
  #   0 → no verifier feedback + simple ReLU template
  #   1 → no verifier feedback
  #   2 → no expressive ReLU template
  #   3 → full setting (verifier feedback + expressive template)
  ablation_level: 3

# ---------------------------------------------------------------------------
# Path Configuration
# ---------------------------------------------------------------------------
paths:
  benchmarking_dir: "../benchmarking"   # Resolved relative to this config file
  results_dir: "../results"
  logs_dir: "logs"

# ---------------------------------------------------------------------------
# Checker Configuration
# ---------------------------------------------------------------------------
checker:
  timeout: 120  # Per-program checker timeout in seconds
  delta: 1      # Lexicographic decrease margin

# ---------------------------------------------------------------------------
# Error Handling
# ---------------------------------------------------------------------------
error_handling:
  fail_fast: false  # Stop immediately on the first stage error
  max_retries: 3

# ---------------------------------------------------------------------------
# Workflow Flags
# ---------------------------------------------------------------------------
pipeline:
  skip_synthesis: false  # Set true to skip synthesis stage (dry-run only)


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/pipeline.log"
